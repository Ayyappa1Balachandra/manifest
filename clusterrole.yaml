apiVersion: rbac.authorization.k8s.io/v1

kind: ClusterRole


metadata:

  name: mustafa-Clusterrole


rules:


- apiGroups:
  - ""

  resources:

  - pods
  - services

  verbs:

  - get
  - watch
  - list
  - create
  - delete


- apiGroups:

  - apps

  resources:

  - deployments

  verbs:

  - get
  - watch
  - list
  - create
  - delete
